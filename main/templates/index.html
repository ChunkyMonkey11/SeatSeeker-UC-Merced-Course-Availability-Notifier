<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SeatSeeker - UC Merced Course Notifier</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e8e8e8;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background lines */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 150, 255, 0.03) 2px,
                rgba(0, 150, 255, 0.03) 4px
            );
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        .logo {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .logo img {
            height: 80px;
            width: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 168, 255, 0.3));
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: #e8e8e8;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.8;
            color: #b8b8b8;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 168, 255, 0.2);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 168, 255, 0.4);
            box-shadow: 0 15px 40px rgba(0, 168, 255, 0.1);
        }

        .card h2 {
            color: #00a8ff;
            margin-bottom: 20px;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #e8e8e8;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid rgba(0, 168, 255, 0.3);
            border-radius: 8px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            color: #e8e8e8;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #00a8ff;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 0 3px rgba(0, 168, 255, 0.2);
        }

        .form-control::placeholder {
            color: #888;
        }

        .btn {
            background: linear-gradient(135deg, #00a8ff 0%, #0097e6 100%);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 168, 255, 0.4);
            background: linear-gradient(135deg, #0097e6 0%, #00a8ff 100%);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 168, 255, 0.2);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            border-color: rgba(0, 168, 255, 0.4);
            transform: translateY(-2px);
        }

        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #00a8ff;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #b8b8b8;
            font-size: 0.9rem;
        }

        .subscription-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 168, 255, 0.2);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #00a8ff;
            transition: all 0.3s ease;
        }

        .subscription-item:hover {
            border-color: rgba(0, 168, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
        }

        .subscription-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .subscription-email {
            font-weight: 600;
            color: #e8e8e8;
        }

        .subscription-status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }

        .status-available {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
            border: 1px solid rgba(40, 167, 69, 0.3);
        }

        .crn-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .crn-tag {
            background: linear-gradient(135deg, #00a8ff 0%, #0097e6 100%);
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .crn-tag:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(0, 168, 255, 0.3);
        }

        .delete-btn {
            background: #e74c3c;
            border: none;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #c0392b;
            transform: scale(1.1);
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border: 1px solid;
        }

        .alert-success {
            background: rgba(40, 167, 69, 0.1);
            color: #28a745;
            border-color: rgba(40, 167, 69, 0.3);
        }

        .alert-error {
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border-color: rgba(220, 53, 69, 0.3);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00a8ff;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            
            .logo-text {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='images/SeatSeeker Logo.webp') }}" alt="SeatSeeker Logo">
                <div class="logo-text">SeatSeeker</div>
            </div>
            <p>UC Merced Course Availability Notifier</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-number" id="totalSubscriptions">0</div>
                <div class="stat-label">Active Subscriptions</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="totalCourses">0</div>
                <div class="stat-label">Courses Monitored</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="availableCourses">0</div>
                <div class="stat-label">Available Now</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastCheck">--</div>
                <div class="stat-label">Last Check</div>
            </div>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2><i class="fas fa-plus-circle"></i> Add New Subscription</h2>
                
                <div class="alert alert-success" id="successAlert">
                    <i class="fas fa-check-circle"></i> Subscription added successfully!
                </div>
                
                <div class="alert alert-error" id="errorAlert">
                    <i class="fas fa-exclamation-circle"></i> <span id="errorMessage"></span>
                </div>

                <form id="subscriptionForm">
                    <div class="form-group">
                        <label for="email">Email Address:</label>
                        <input type="email" id="email" class="form-control" placeholder="your.email@ucmerced.edu" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="crns">Course Registration Numbers (CRNs):</label>
                        <textarea id="crns" class="form-control" rows="3" placeholder="Enter CRNs separated by commas (e.g., 30119, 33000)" required></textarea>
                    </div>
                    
                    <button type="submit" class="btn">
                        <i class="fas fa-bell"></i> Subscribe to Notifications
                    </button>
                </form>
            </div>

            <div class="card">
                <h2><i class="fas fa-list"></i> Active Subscriptions</h2>
                
                <div class="loading" id="loadingSubscriptions">
                    <div class="spinner"></div>
                    <p>Loading subscriptions...</p>
                </div>
                
                <div id="subscriptionsList">
                    <p style="text-align: center; color: #888;">No active subscriptions found.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize dashboard
        document.addEventListener('DOMContentLoaded', function() {
            loadSubscriptions();
            loadStats();
        });

        // Load subscription statistics
        async function loadStats() {
            try {
                const response = await fetch('/api/subscriptions');
                const subscriptions = await response.json();
                
                let totalSubscriptions = 0;
                let totalCourses = 0;
                
                Object.values(subscriptions).forEach(subs => {
                    totalSubscriptions += subs.length;
                    totalCourses += subs.length;
                });
                
                document.getElementById('totalSubscriptions').textContent = totalSubscriptions;
                document.getElementById('totalCourses').textContent = totalCourses;
                document.getElementById('availableCourses').textContent = '0'; // Will be updated when we implement course checking
                document.getElementById('lastCheck').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load and display subscriptions
        async function loadSubscriptions() {
            const loadingDiv = document.getElementById('loadingSubscriptions');
            const subscriptionsList = document.getElementById('subscriptionsList');
            
            loadingDiv.style.display = 'block';
            subscriptionsList.style.display = 'none';
            
            try {
                const response = await fetch('/api/subscriptions');
                const subscriptions = await response.json();
                
                if (Object.keys(subscriptions).length === 0) {
                    subscriptionsList.innerHTML = '<p style="text-align: center; color: #888;">No active subscriptions found.</p>';
                } else {
                    subscriptionsList.innerHTML = Object.entries(subscriptions).map(([email, subs]) => `
                        <div class="subscription-item">
                            <div class="subscription-header">
                                <div class="subscription-email">
                                    <i class="fas fa-envelope"></i> ${email}
                                </div>
                                <span class="subscription-status status-${subs[0].status}">
                                    ${subs[0].status.toUpperCase()}
                                </span>
                            </div>
                            <div class="crn-tags">
                                ${subs.map(sub => `
                                    <span class="crn-tag">
                                        <i class="fas fa-hashtag"></i> ${sub.crn}
                                        <button class="delete-btn delete-sub-btn" data-email="${email}" data-crn="${sub.crn}" title="Remove">
                                            <i class="fas fa-times"></i>
                                        </button>
                                    </span>
                                `).join('')}
                            </div>
                            <small style="color: #888; margin-top: 10px; display: block;">
                                Last checked: ${new Date(subs[0].last_checked).toLocaleString()}
                            </small>
                        </div>
                    `).join('');

                    attachDeleteHandlers();
                }
            } catch (error) {
                subscriptionsList.innerHTML = '<p style="text-align: center; color: #dc3545;">Error loading subscriptions.</p>';
            } finally {
                loadingDiv.style.display = 'none';
                subscriptionsList.style.display = 'block';
            }
        }

        // Attach delete handlers to buttons
        function attachDeleteHandlers() {
            const buttons = document.querySelectorAll('.delete-sub-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const email = btn.getAttribute('data-email');
                    const crn = btn.getAttribute('data-crn');

                    if (!confirm(`Remove subscription for ${email} - CRN ${crn}?`)) {
                        return;
                    }

                    try {
                        const res = await fetch('/api/subscriptions', {
                            method: 'DELETE',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ email, crn })
                        });
                        if (res.ok) {
                            showAlert('success', 'Subscription removed successfully');
                            loadSubscriptions();
                            loadStats();
                        } else {
                            const data = await res.json();
                            showAlert('error', data.error || data.message || 'Failed to remove subscription');
                        }
                    } catch (err) {
                        showAlert('error', 'Network error. Please try again.');
                    }
                });
            });
        }

        // Handle form submission
        document.getElementById('subscriptionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const crnsText = document.getElementById('crns').value;
            const crns = crnsText.split(',').map(crn => crn.trim()).filter(crn => crn);
            
            const submitBtn = e.target.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            
            // Show loading state
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Adding...';
            submitBtn.disabled = true;
            
            try {
                const response = await fetch('/api/subscriptions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, crns }),
                });

                if (response.ok) {
                    showAlert('success', 'Subscription added successfully!');
                    document.getElementById('subscriptionForm').reset();
                    loadSubscriptions();
                    loadStats();
                } else {
                    const data = await response.json();
                    showAlert('error', data.error || 'Error creating subscription');
                }
            } catch (error) {
                showAlert('error', 'Network error. Please try again.');
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Show alerts
        function showAlert(type, message) {
            const successAlert = document.getElementById('successAlert');
            const errorAlert = document.getElementById('errorAlert');
            const errorMessage = document.getElementById('errorMessage');
            
            successAlert.style.display = 'none';
            errorAlert.style.display = 'none';
            
            if (type === 'success') {
                successAlert.style.display = 'block';
                successAlert.textContent = message;
                setTimeout(() => {
                    successAlert.style.display = 'none';
                }, 3000);
            } else {
                errorMessage.textContent = message;
                errorAlert.style.display = 'block';
                setTimeout(() => {
                    errorAlert.style.display = 'none';
                }, 5000);
            }
        }
    </script>
</body>
</html>
